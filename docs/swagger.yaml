    properties:
      status:
        type: string
      timestamp:
        type: string
      version:
        type: string
    type: object
  models.AccountType:
    enum:
    - expense
    - income
    - transfer
    type: string
    x-enum-varnames:
    - AccountTypeExpense
    - AccountTypeIncome
    - AccountTypeTransfer
  models.CategoryType:
    enum:
    - expense
    - income
    - transfer
    type: string
    x-enum-varnames:
    - CategoryTypeExpense
    - CategoryTypeIncome
    - CategoryTypeTransfer
  models.CreateAccountRequest:
    properties:
      balance:
        type: integer
      name:
        type: string
      type:
        allOf:
        - $ref: '#/definitions/models.AccountType'
        enum:
        - expense
        - income
        - transfer
    required:
    - name
    - type
    type: object
  models.CreateCategoryRequest:
    properties:
      name:
        type: string
      type:
        allOf:
        - $ref: '#/definitions/models.CategoryType'
        enum:
        - expense
        - income
        - transfer
    required:
    - name
    - type
    type: object
  models.CreateDraftRequest:
    properties:
      account_id:
        type: string
      amount:
        type: integer
      category_id:
        type: string
      currency:
        type: string
      notes:
        type: string
      source:
        enum:
        - manual
        - ingestion
        type: string
      title:
        type: string
      transaction_type:
        enum:
        - expense
        - income
        - transfer
        type: string
      transfer_account_id:
        type: string
    required:
    - account_id
    - amount
    - category_id
    - currency
    - source
    - title
    - transaction_type
    type: object
  models.CreateTransactionRequest:
    properties:
      account_id:
        type: string
      amount:
        type: integer
      category_id:
        type: string
      currency:
        type: string
      notes:
        type: string
      title:
        type: string
      transaction_type:
        allOf:
        - $ref: '#/definitions/models.TransactionType'
        enum:
        - expense
        - income
        - transfer
      transfer_account_id:
        type: string
    required:
    - account_id
    - amount
    - category_id
    - currency
    - title
    - transaction_type
    type: object
  models.TransactionType:
    enum:
    - expense
    - income
    - transfer
    type: string
    x-enum-varnames:
    - TransactionTypeExpense
    - TransactionTypeIncome
    - TransactionTypeTransfer
  models.UpdateAccountRequest:
    properties:
      balance:
        type: integer
      name:
        type: string
      type:
        $ref: '#/definitions/models.AccountType'
    type: object
  models.UpdateCategoryRequest:
    properties:
      name:
        type: string
      type:
        $ref: '#/definitions/models.CategoryType'
    type: object
  models.UpdateDraftRequest:
    properties:
      account_id:
        type: string
      amount:
        type: integer
      category_id:
        type: string
      currency:
        type: string
      notes:
        type: string
      title:
        type: string
      transaction_type:
        type: string
      transfer_account_id:
        type: string
    type: object
  models.UpdateTransactionRequest:
    properties:
      account_id:
        type: string
      amount:
        type: integer
      category_id:
        type: string
      currency:
        type: string
      notes:
        type: string
      title:
        type: string
      transaction_type:
        $ref: '#/definitions/models.TransactionType'
      transfer_account_id:
        type: string
    type: object
  response.Meta:
    properties:
      page:
        type: integer
      per_page:
        type: integer
      total:
        type: integer
      total_pages:
        type: integer
    type: object
  response.PaginatedResponse:
    properties:
      data: {}
      error:
        type: string
      meta:
