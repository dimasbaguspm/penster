definitions:
  handler.HealthResponse:
    properties:
      status:
        type: string
      timestamp:
        type: string
      version:
        type: string
    type: object
  models.AccountType:
    enum:
    - expense
    - income
    - transfer
    type: string
    x-enum-varnames:
    - AccountTypeExpense
    - AccountTypeIncome
    - AccountTypeTransfer
  models.CategoryType:
    enum:
    - expense
    - income
    - transfer
    type: string
    x-enum-varnames:
    - CategoryTypeExpense
    - CategoryTypeIncome
    - CategoryTypeTransfer
  models.CreateAccountRequest:
    properties:
      balance:
        type: integer
      name:
        type: string
      type:
        allOf:
        - $ref: '#/definitions/models.AccountType'
        enum:
        - expense
        - income
        - transfer
    required:
    - name
    - type
    type: object
  models.CreateCategoryRequest:
    properties:
      name:
        type: string
      type:
        allOf:
        - $ref: '#/definitions/models.CategoryType'
        enum:
        - expense
        - income
        - transfer
    required:
    - name
    - type
    type: object
  models.UpdateAccountRequest:
    properties:
      balance:
        type: integer
      name:
        type: string
      type:
        $ref: '#/definitions/models.AccountType'
    type: object
  models.UpdateCategoryRequest:
    properties:
      name:
        type: string
      type:
        $ref: '#/definitions/models.CategoryType'
    type: object
  response.Meta:
    properties:
      page:
        type: integer
      per_page:
        type: integer
      total:
        type: integer
      total_pages:
        type: integer
    type: object
  response.PaginatedResponse:
    properties:
      data: {}
      error:
        type: string
      meta:
        $ref: '#/definitions/response.Meta'
      success:
        type: boolean
    type: object
  response.Response:
    properties:
      data: {}
      error:
        type: string
      meta:
        $ref: '#/definitions/response.Meta'
      success:
        type: boolean
    type: object
info:
  contact: {}
paths:
  /accounts:
    get:
      consumes:
      - application/json
      description: Get a paginated list of accounts with optional filtering
      parameters:
      - description: Search query
        in: query
        name: q
        type: string
      - description: Sort by field
        in: query
        name: sort_by
        type: string
      - description: Sort order (asc/desc)
        in: query
        name: sort_order
        type: string
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 10
        description: Page size
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.PaginatedResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Response'
      summary: List all accounts
      tags:
      - accounts
    post:
      consumes:
      - application/json
      description: Create a new account with name, type and optional balance
      parameters:
      - description: Account creation request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.CreateAccountRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/response.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Response'
      summary: Create a new account
      tags:
      - accounts
  /accounts/{id}:
    delete:
      consumes:
      - application/json
      description: Soft delete an account by its UUID
      parameters:
      - description: Account UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Response'
      summary: Delete an account
      tags:
      - accounts
    get:
      consumes:
      - application/json
      description: Get a single account by its UUID
      parameters:
      - description: Account UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Response'
      summary: Get account by ID
      tags:
      - accounts
    put:
      consumes:
      - application/json
      description: Update an existing account by its UUID
      parameters:
      - description: Account UUID
        in: path
        name: id
        required: true
        type: string
      - description: Account update request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.UpdateAccountRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Response'
      summary: Update an account
      tags:
      - accounts
